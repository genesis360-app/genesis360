name: MELI Stock & Price Sync

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Run meli-stock-worker
        run: |
          curl --fail -s -X POST \
            "${{ secrets.SUPABASE_URL }}/functions/v1/meli-stock-worker" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Content-Type: application/json"
