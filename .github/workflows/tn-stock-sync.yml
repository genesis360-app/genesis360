name: TN Stock Sync

on:
  schedule:
    - cron: '*/5 * * * *'   # cada 5 minutos
  workflow_dispatch:          # disparo manual desde GitHub Actions UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Disparar worker de sync de stock
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.SUPABASE_URL }}/functions/v1/tn-stock-worker" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
