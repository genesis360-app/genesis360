<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test Distancia — Genesis360</title>
<style>
  body { font-family: sans-serif; max-width: 560px; margin: 40px auto; padding: 0 20px; background: #f9fafb; }
  h2 { color: #7c3aed; }
  label { display: block; font-size: 13px; color: #6b7280; margin-bottom: 4px; margin-top: 16px; }
  input { width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 14px;
          border: 1.5px solid #d1d5db; border-radius: 10px; outline: none; }
  input:focus { border-color: #7c3aed; }
  button { margin-top: 20px; width: 100%; padding: 12px; background: #7c3aed; color: white;
           border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
  button:hover { background: #6d28d9; }
  #resultado { margin-top: 20px; padding: 16px; border-radius: 12px; font-size: 15px; display: none; }
  .ok { background: #d1fae5; color: #065f46; border: 1.5px solid #6ee7b7; }
  .error { background: #fee2e2; color: #991b1b; border: 1.5px solid #fca5a5; }
  .loading { background: #fef3c7; color: #92400e; border: 1.5px solid #fcd34d; }
  .km { font-size: 28px; font-weight: 700; color: #7c3aed; }
</style>
</head>
<body>
<h2>🗺 Test Cálculo de Distancia</h2>
<p style="color:#6b7280;font-size:13px;">Simulación exacta del código en VentasPage (Haversine + Nominatim)</p>

<label>Dirección de origen</label>
<input id="origen" type="text" value="Av. Triunvirato 5428, Ciudad Autónoma de Buenos Aires" />

<label>Dirección de destino</label>
<input id="destino" type="text" value="Triunvirato 2066, Don Torcuato, Buenos Aires" />

<button onclick="calcular()">Calcular distancia</button>

<div id="resultado"></div>

<script>
async function geocode(address) {
  const url = 'https://nominatim.openstreetmap.org/search?' +
    new URLSearchParams({ q: address, format: 'jsonv2', limit: '1', countrycodes: 'ar' })
  const res = await fetch(url, { headers: { 'User-Agent': 'Genesis360App/1.0' } })
  const data = await res.json()
  if (!data?.[0]) throw new Error('No se encontró la dirección: ' + address)
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name }
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371
  const dLat = (lat2 - lat1) * Math.PI / 180
  const dLon = (lon2 - lon1) * Math.PI / 180
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2
  const lineal = R * 2 * Math.asin(Math.sqrt(a))
  return Math.round(lineal * 1.35 * 10) / 10  // × 1.35 estimación carretera
}

async function calcular() {
  const div = document.getElementById('resultado')
  div.className = 'loading'; div.style.display = 'block'
  div.textContent = 'Geocodificando con Nominatim...'

  try {
    const origen  = document.getElementById('origen').value.trim()
    const destino = document.getElementById('destino').value.trim()
    if (!origen || !destino) throw new Error('Completá ambos campos')

    div.textContent = 'Geocodificando origen...'
    const o = await geocode(origen)
    div.textContent = 'Geocodificando destino...'
    const d = await geocode(destino)

    const km = haversine(o.lat, o.lon, d.lat, d.lon)

    div.className = 'ok'
    div.innerHTML = `
      <div class="km">${km} km</div>
      <p style="margin:8px 0 0"><strong>Origen:</strong> ${o.display.replace(/, Argentina$/, '')}</p>
      <p style="margin:4px 0 0"><strong>Destino:</strong> ${d.display.replace(/, Argentina$/, '')}</p>
      <p style="margin:8px 0 0;font-size:12px;color:#6b7280">Distancia por carretera estimada (Haversine × 1.35)<br>
      Coords origen: ${o.lat},${o.lon} | Coords destino: ${d.lat},${d.lon}</p>
    `
  } catch(e) {
    div.className = 'error'
    div.textContent = '❌ Error: ' + e.message
  }
}
</script>
</body>
</html>
